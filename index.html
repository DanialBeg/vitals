<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#06090f" />
    <meta name="description" content="A study accountability monitor for the RACP Adult Medicine DWE." />

    <!-- No-flash theme init: set data-theme before first paint. -->
    <script>
      (function () {
        try {
          var u = new URLSearchParams(location.search).get("theme");
          var t = u === "light" || u === "dark" ? u : localStorage.getItem("vitals.theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <!-- iOS standalone / Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vitals" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <title>Vitals</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
